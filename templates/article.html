<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ item['title'] }} | Artikel Berita</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-200 font-sans min-h-screen flex flex-col">
    <nav class="bg-white border-b-4 border-black shadow-[0_8px_0_0_#000] relative z-20">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20">
          <div class="flex w-full items-center justify-between">
            <a href="/" class="flex-shrink-0 flex items-center cursor-pointer group">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-black group-hover:scale-110 transition-transform">
                <path d="m12 22-8-4.5v-7.5l8-4.5 8 4.5v7.5z"/>
                <path d="m12 8v4"/>
                <path d="m12 16h.01"/>
              </svg>

              <span class="ml-2 text-3xl font-black tracking-tighter text-black uppercase decoration-4 decoration-black">
                Guard<span class="bg-black text-white px-2 py-1 ml-1">Hoax</span>
              </span>
            </a>

            <div class="hidden sm:flex sm:space-x-4">
              <a href="/" class="nav-btn bg-white text-black hover:bg-slate-200 hover:shadow-[4px_4px_0_0_#000] border-4 border-black px-6 py-2 text-md font-black uppercase tracking-wider transition-all inline-flex items-center">
                Beranda
              </a>

              <a href="/prediction" class="nav-btn bg-white text-black hover:bg-slate-200 hover:shadow-[4px_4px_0_0_#000] flex items-center border-4 border-black px-6 py-2 text-md font-black uppercase tracking-wider transition-all">
                Prediksi
              </a>

              <a href="/information" class="nav-btn bg-black text-white shadow-[4px_4px_0_0_#000] flex items-center border-4 border-black px-6 py-2 text-md font-black uppercase tracking-wider transition-all">
                Data
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="sm:hidden border-t-4 border-black bg-white p-4">
        <div class="flex flex-col space-y-3">
          <a href="/" class="mobile-nav-btn px-4 py-3 border-4 border-black text-lg font-black uppercase transition-all bg-white text-black shadow-[4px_4px_0_0_#000] text-center">
            Beranda
          </a>

          <a href="/prediction" class="mobile-nav-btn px-4 py-3 border-4 border-black text-lg font-black uppercase transition-all bg-white text-black shadow-[4px_4px_0_0_#000] text-center">
            Prediksi
          </a>

          <a href="/information" class="mobile-nav-btn px-4 py-3 border-4 border-black text-lg font-black uppercase transition-all bg-black text-white shadow-[4px_4px_0_0_#000] text-center">
            Data
          </a>
        </div>
      </div>
    </nav>

    <main class="flex-1 p-4 sm:p-8">
      <section class="max-w-6xl mx-auto space-y-10 py-6">
        <div class="bg-white border-4 border-black shadow-[12px_12px_0_0_#000] p-8 md:p-12">
          <div class="flex flex-col gap-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
              <div>
                <span class="inline-flex items-center px-4 py-2 text-sm font-black uppercase border-4 border-black bg-yellow-300 shadow-[4px_4px_0_0_#000]">
                  {{ item['label'] }}
                </span>
                <span class="ml-3 inline-flex items-center px-3 py-2 text-sm font-black uppercase border-4 border-black bg-cyan-100 shadow-[4px_4px_0_0_#000]">
                  {{ item['topic'] }}
                </span>
              </div>

              <div class="text-right space-y-2">
                <p class="text-sm font-black uppercase tracking-widest">
                  {{ item['source'] }}
                </p>
                <p class="text-sm font-bold uppercase tracking-widest">
                  {{ item['publication_date'] }}
                </p>
              </div>
            </div>

            <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tight text-black">
              {{ item['title'] }}
            </h1>

            <div class="text-lg leading-relaxed text-slate-900 bg-slate-100 border-4 border-black p-8 shadow-[inset_6px_6px_0_0_#cbd5e1] rounded-lg">
              {{ item['content'] }}
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-4">
              <a href="/information" class="inline-flex items-center justify-center w-full sm:w-auto border-4 border-black bg-black px-8 py-4 text-lg font-black uppercase text-white shadow-[6px_6px_0_0_#000] hover:bg-white hover:text-black transition-all">
                Kembali ke Data
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-white border-t-4 border-black mt-auto">
      <div class="mx-auto max-w-7xl px-6 py-6 lg:px-8">
        <p class="text-center text-sm font-bold text-black uppercase tracking-wider">
          &copy; 2026 Sistem Deteksi Hoax. All rights reserved.
        </p>
      </div>
    </footer>
  </body>
</html>
